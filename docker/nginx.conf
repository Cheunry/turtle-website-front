server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # 确保正确的 MIME 类型
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 优化: 开启长连接，减少 TCP 握手开销
    keepalive_timeout 65;

    # 启用 gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    # 推荐设置为 5 或 6 (默认是 1，压缩率低)
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # SPA 路由支持（Vue Router history 模式）
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # 反向代理配置
    location /api/ {
        # 处理 OPTIONS 预检请求
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE';
            add_header 'Access-Control-Allow-Headers' 'DNT,X-Mx-ReqToken,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization';
            return 204;
        }

        proxy_pass http://novel-gateway:8888/api/;
        
        # 优化: 启用 HTTP/1.1 以支持长连接
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # 绕过 Gateway 的 CORS 检查 (模拟 curl 请求)
        proxy_set_header Origin "";
        proxy_set_header Referer "";
        
        # 允许跨域 (虽然 Gateway 配了，但 Nginx 也可以加一道保险)
        # 注意：如果后端也返回了这些头，可能会导致重复，如果报错"Multiple Allow-Origin"请注释掉这里
        # add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
